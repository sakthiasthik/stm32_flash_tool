name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  # ── Linux Build ──────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: bash build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: STM32-Flasher-Linux
          path: dist/STM32-Flasher

  # ── Windows Build ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        shell: cmd
        run: build.bat

      - uses: actions/upload-artifact@v4
        with:
          name: STM32-Flasher-Windows
          path: dist/STM32-Flasher.exe

  # ── GitHub Release (only on version tags like v0.1.0) ────────────────────
  release:
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: STM32-Flasher-Linux
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: STM32-Flasher-Windows
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: release/*
          generate_release_notes: true
